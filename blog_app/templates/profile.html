<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="navbar">
        <div class="nav-brand">Blog Social</div>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/create">Create</a>
            <button id="nav-logout" class="btn-link" style="display:none;">Logout</button>
        </nav>
    </header>

    <main class="container">
        <section class="profile-header">
            <img id="profile-pic" class="profile-pic" src="" alt="Profile" />
            <div class="profile-info">
                <h1 id="profile-username">Profile</h1>
                <p id="profile-bio"></p>
                <div class="profile-stats">
                    <span id="profile-posts-count"></span>
                    <span id="profile-likes"></span>
                </div>

                <div class="profile-upload">
                    <form id="profile-image-form" enctype="multipart/form-data">
                        <label for="profile-image-input">Change profile picture</label>
                        <input type="file" id="profile-image-input" name="profile_image" accept="image/*">
                        <button type="submit" class="small">Upload</button>
                    </form>
                </div>
            </div>
        </section>

        <section class="profile-posts">
            <h2>Posts</h2>
            <div id="profile-posts" class="posts"></div>
        </section>

        <section class="notifications">
            <h2>Notifications</h2>
            <div id="notifications"></div>
        </section>
    </main>

    <script>
        const API_BASE = '';
        let currentUser = null;

        async function fetchJson(url, options) {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        async function checkSession() {
            try {
                currentUser = await fetchJson(`${API_BASE}/auth/me`);
                document.getElementById('nav-logout').style.display = 'inline-block';
                return currentUser;
            } catch {
                window.location.href = '/';
            }
        }

        async function loadProfile(username) {
            const user = await fetchJson(`${API_BASE}/auth/users/${username}`);
            document.getElementById('profile-username').textContent = user.username;
            document.getElementById('profile-bio').textContent = user.bio;
            document.getElementById('profile-pic').src = user.profile_pic;
            document.getElementById('profile-posts-count').textContent = `${user.post_count} posts`;
            document.getElementById('profile-likes').textContent = `${user.likes_count} likes`;

            const postsDiv = document.getElementById('profile-posts');
            postsDiv.innerHTML = '';
            user.posts.forEach(post => {
                const postCard = document.createElement('div');
                postCard.className = 'post-card';
                postCard.innerHTML = `
                    <div class="post-body">
                        <p>${post.content}</p>
                        ${post.image_url ? `<img class="post-image" src="${post.image_url}" alt="Post image">` : ''}
                        <div class="post-stats">${post.likes_count} likes • ${post.comments_count} comments</div>
                    </div>
                `;
                postsDiv.appendChild(postCard);
            });
        }

        async function logout() {
            await fetch(`${API_BASE}/auth/logout`);
            window.location.href = '/';
        }

        function getUsernameFromPath() {
            const match = window.location.pathname.match(/\/profile\/(.+)$/);
            return match ? match[1] : null;
        }

        async function init() {
            await checkSession();
            const username = getUsernameFromPath() || currentUser.username;
            await loadProfile(username);
        }

        document.getElementById('nav-logout').addEventListener('click', logout);

        document.getElementById('profile-image-form').addEventListener('submit', async e => {
            e.preventDefault();
            const input = document.getElementById('profile-image-input');
            if (!input.files || input.files.length === 0) return;

            const formData = new FormData();
            formData.append('profile_image', input.files[0]);

            const res = await fetch(`${API_BASE}/auth/upload-profile-image`, {
                method: 'POST',
                body: formData,
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById('profile-pic').src = data.profile_pic;
                input.value = '';
            } else {
                alert('Upload failed');
            }
        });

        init();
    </script>
</body>
</html>
